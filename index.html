<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Life Board">
<title>My Life Board</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --subtext: #6e6e73;
    --border: #e0e0e5;
    --home: #34c759;
    --nonprofit: #30b0c7;
    --business: #ff9f0a;
    --personal: #af52de;
    --done-bg: #f0f0f5;
    --done-text: #aeaeb2;
    --progress-bg: #fff8e1;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 14px;
    --fab-size: 56px;
    --header-h: 120px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --card-bg: #2c2c2e;
      --text: #f5f5f7;
      --subtext: #98989d;
      --border: #3a3a3c;
      --done-bg: #2c2c2e;
      --done-text: #636366;
      --progress-bg: #2c2a1e;
      --shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 8px;
    box-shadow: var(--shadow);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-date { font-size: 12px; color: var(--subtext); margin-top: 2px; }
  .header-stats { text-align: right; }
  .stats-done { font-size: 20px; font-weight: 700; }
  .stats-label { font-size: 11px; color: var(--subtext); }

  .progress-wrap { margin: 6px 0 10px; }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #34c759, #30d158);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 11px; color: var(--subtext); margin-top: 3px; }

  .banner {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
    padding: 10px 16px;
    font-size: 13px;
    font-style: italic;
    line-height: 1.4;
  }

  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 12px 16px 0;
    scrollbar-width: none;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    border: none;
    background: var(--border);
    color: var(--subtext);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { color: white; }
  .tab[data-cat="all"].active { background: var(--text); }
  .tab[data-cat="home"].active { background: var(--home); }
  .tab[data-cat="nonprofit"].active { background: var(--nonprofit); }
  .tab[data-cat="business"].active { background: var(--business); }
  .tab[data-cat="personal"].active { background: var(--personal); }

  .filters {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--subtext);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pill.active { border-color: var(--text); color: var(--text); background: var(--border); }

  .task-list { padding: 4px 16px; }
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--subtext);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 15px; }

  .task-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border-left: 4px solid transparent;
    transition: opacity 0.2s;
  }
  .task-card[data-cat="home"]    { border-left-color: var(--home); }
  .task-card[data-cat="nonprofit"] { border-left-color: var(--nonprofit); }
  .task-card[data-cat="business"] { border-left-color: var(--business); }
  .task-card[data-cat="personal"] { border-left-color: var(--personal); }
  .task-card.done { opacity: 0.6; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--done-text); }

  .task-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 10px;
    cursor: pointer;
  }
  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 13px;
    margin-top: 1px;
  }
  .task-card.done .task-check { background: var(--home); border-color: var(--home); color: white; }
  .task-card[data-cat="nonprofit"].done .task-check { background: var(--nonprofit); border-color: var(--nonprofit); }
  .task-card[data-cat="business"].done .task-check { background: var(--business); border-color: var(--business); }
  .task-card[data-cat="personal"].done .task-check { background: var(--personal); border-color: var(--personal); }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .task-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .cat-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 6px;
    color: white;
  }
  [data-cat="home"]    .cat-badge { background: var(--home); }
  [data-cat="nonprofit"] .cat-badge { background: var(--nonprofit); }
  [data-cat="business"] .cat-badge { background: var(--business); }
  [data-cat="personal"] .cat-badge { background: var(--personal); }

  .status-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 6px;
    background: var(--progress-bg);
    color: var(--business);
  }
  .task-note-preview {
    font-size: 12px;
    color: var(--subtext);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-chevron { font-size: 12px; color: var(--subtext); flex-shrink: 0; margin-top: 3px; }

  .task-expand {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid var(--border);
  }
  .task-card.expanded .task-expand { display: block; }
  .expand-label { font-size: 11px; font-weight: 600; color: var(--subtext); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
  .note-area {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    resize: none;
    min-height: 70px;
    line-height: 1.5;
  }
  .note-area:focus { outline: none; border-color: #667eea; }
  .expand-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 7px 14px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.7; }
  .btn-save { background: #667eea; color: white; }
  .btn-progress { background: var(--progress-bg); color: var(--business); }
  .btn-edit { background: var(--border); color: var(--text); }
  .btn-delete { background: #ffe5e5; color: #ff3b30; margin-left: auto; }
  @media (prefers-color-scheme: dark) {
    .btn-delete { background: #3a1a1a; }
    .btn-progress { background: #2c2a1e; }
  }

  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: var(--fab-size);
    height: var(--fab-size);
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(102,126,234,0.5);
    cursor: pointer;
    z-index: 200;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.92); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%;
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; display: block; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: #667eea; }
  .form-textarea { min-height: 80px; resize: none; }
  .cat-selector { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-opt {
    flex: 1;
    min-width: 70px;
    padding: 10px 4px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--subtext);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-opt.active[data-v="home"]       { border-color: var(--home); background: var(--home); color: white; }
  .cat-opt.active[data-v="nonprofit"]  { border-color: var(--nonprofit); background: var(--nonprofit); color: white; }
  .cat-opt.active[data-v="business"]   { border-color: var(--business); background: var(--business); color: white; }
  .cat-opt.active[data-v="personal"]   { border-color: var(--personal); background: var(--personal); color: white; }
  .modal-submit {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
  }
  .modal-cancel {
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--subtext);
    border: none;
    font-size: 15px;
    cursor: pointer;
    margin-top: 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">My Life Board</div>
      <div class="header-date" id="hdrDate"></div>
    </div>
    <div class="header-stats">
      <div class="stats-done" id="statsDone">0</div>
      <div class="stats-label">done today</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">Loading...</div>
  </div>
</div>

<div class="banner" id="banner"></div>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="home">Home</button>
  <button class="tab" data-cat="nonprofit">Nonprofit</button>
  <button class="tab" data-cat="business">Business</button>
  <button class="tab" data-cat="personal">Personal</button>
</div>

<div class="filters" id="filters">
  <button class="pill active" data-status="all">All</button>
  <button class="pill" data-status="todo">To Do</button>
  <button class="pill" data-status="progress">In Progress</button>
  <button class="pill" data-status="done">Done</button>
</div>

<div class="task-list" id="taskList"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Task</div>
    <div class="form-group">
      <label class="form-label">Title</label>
      <input class="form-input" id="fTitle" placeholder="What needs to get done?">
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-selector">
        <button class="cat-opt active" data-v="home">Home</button>
        <button class="cat-opt" data-v="nonprofit">Nonprofit</button>
        <button class="cat-opt" data-v="business">Business</button>
        <button class="cat-opt" data-v="personal">Personal</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Notes (optional)</label>
      <textarea class="form-textarea" id="fNote" placeholder="Add context, links, or a starting note..."></textarea>
    </div>
    <button class="modal-submit" id="modalSubmit" onclick="submitTask()">Add Task</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const QUOTES = [
  "Small steps every day add up to big change. Keep going, John!",
  "Progress, not perfection. You're doing great.",
  "Every checked box is a win. Celebrate it.",
  "You've built something beautiful in Lumensparq. Keep that energy at home too.",
  "One thing at a time. You've got this.",
  "Done is better than perfect. Ship it.",
  "Rest is part of the work. Take care of yourself too.",
  "Your future self will thank today's you.",
  "The goal is consistency, not intensity.",
  "What you do daily defines who you become."
];

const KEY = 'mlb_tasks';
let tasks = [];
let activeCat = 'all';
let activeStatus = 'all';
let editingId = null;

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function load() {
  const raw = localStorage.getItem(KEY);
  if (raw) {
    tasks = JSON.parse(raw);
  } else {
    tasks = [
      { id: uid(), title: 'Write next Lumensparq article', cat: 'nonprofit', status: 'todo', note: 'Check the editorial calendar for the next topic.' },
      { id: uid(), title: 'Review pending embroidery orders', cat: 'business', status: 'todo', note: '' },
      { id: uid(), title: 'Declutter the living room', cat: 'home', status: 'todo', note: '' },
      { id: uid(), title: 'Schedule dentist appointment', cat: 'personal', status: 'todo', note: '' },
      { id: uid(), title: 'Update Lumensparq website content', cat: 'nonprofit', status: 'todo', note: '' },
    ];
    save();
  }
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(tasks));
}

function render() {
  const d = new Date();
  document.getElementById('hdrDate').textContent = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  const total = tasks.length;
  const done = tasks.filter(t => t.status === 'done').length;
  const inProg = tasks.filter(t => t.status === 'progress').length;
  document.getElementById('statsDone').textContent = done;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    total ? done + ' of ' + total + ' done - ' + inProg + ' in progress' : 'No tasks yet - tap + to add one';

  const q = QUOTES[Math.floor(d.getDate() % QUOTES.length)];
  document.getElementById('banner').textContent = '"' + q + '"';

  let filtered = tasks.filter(t => {
    if (activeCat !== 'all' && t.cat !== activeCat) return false;
    if (activeStatus !== 'all' && t.status !== activeStatus) return false;
    return true;
  });

  const list = document.getElementById('taskList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">🎉</div><p>Nothing here — ' + (activeStatus === 'done' ? 'keep completing tasks!' : 'tap + to add a task.') + '</p></div>';
    return;
  }

  const order = { todo: 0, progress: 1, done: 2 };
  filtered.sort((a, b) => order[a.status] - order[b.status]);

  list.innerHTML = filtered.map(t => {
    const isDone = t.status === 'done';
    const isProgress = t.status === 'progress';
    const catLabel = { home:'Home', nonprofit:'Nonprofit', business:'Business', personal:'Personal' }[t.cat];
    return '<div class="task-card ' + (isDone ? 'done' : '') + '" data-cat="' + t.cat + '" data-id="' + t.id + '">' +
      '<div class="task-main" onclick="toggleExpand(\'' + t.id + '\')">' +
        '<div class="task-check" onclick="toggleDone(event,\'' + t.id + '\')">' + (isDone ? '✓' : '') + '</div>' +
        '<div class="task-body">' +
          '<div class="task-title">' + esc(t.title) + '</div>' +
          '<div class="task-meta">' +
            '<span class="cat-badge">' + catLabel + '</span>' +
            (isProgress ? '<span class="status-badge">In Progress</span>' : '') +
          '</div>' +
          (t.note ? '<div class="task-note-preview">' + esc(t.note) + '</div>' : '') +
        '</div>' +
        '<div class="task-chevron">›</div>' +
      '</div>' +
      '<div class="task-expand" id="exp-' + t.id + '">' +
        '<div class="expand-label" style="margin-top:12px">Notes</div>' +
        '<textarea class="note-area" id="note-' + t.id + '" placeholder="Add notes, links, or context...">' + esc(t.note || '') + '</textarea>' +
        '<div class="expand-actions">' +
          '<button class="btn btn-save" onclick="saveNote(\'' + t.id + '\')">Save Note</button>' +
          '<button class="btn btn-progress" onclick="toggleProgress(event,\'' + t.id + '\')">' + (isProgress ? 'Clear Progress' : 'Mark In Progress') + '</button>' +
          '<button class="btn btn-edit" onclick="editTask(event,\'' + t.id + '\')">Edit</button>' +
          '<button class="btn btn-delete" onclick="deleteTask(event,\'' + t.id + '\')">Delete</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleExpand(id) {
  const card = document.querySelector('.task-card[data-id="' + id + '"]');
  const exp = document.getElementById('exp-' + id);
  if (!card || !exp) return;
  const isOpen = card.classList.contains('expanded');
  document.querySelectorAll('.task-card.expanded').forEach(c => {
    c.classList.remove('expanded');
    c.querySelector('.task-expand').style.display = 'none';
  });
  if (!isOpen) {
    card.classList.add('expanded');
    exp.style.display = 'block';
    exp.querySelector('textarea').focus();
  }
}

function toggleDone(e, id) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === 'done' ? 'todo' : 'done';
  save();
  render();
}

function toggleProgress(e, id) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === 'progress' ? 'todo' : 'progress';
  save();
  render();
}

function saveNote(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const el = document.getElementById('note-' + id);
  if (el) t.note = el.value;
  save();
  const card = document.querySelector('.task-card[data-id="' + id + '"]');
  if (card) {
    const preview = card.querySelector('.task-note-preview');
    if (preview && t.note) preview.textContent = t.note;
    else if (!t.note && preview) preview.remove();
  }
  const btn = document.querySelector('#exp-' + id + ' .btn-save');
  if (btn) { btn.textContent = 'Saved'; setTimeout(function() { btn.textContent = 'Save Note'; }, 1500); }
}

function deleteTask(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function editTask(e, id) {
  e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('fTitle').value = t.title;
  document.getElementById('fNote').value = t.note || '';
  document.querySelectorAll('.cat-opt').forEach(o => {
    o.classList.toggle('active', o.dataset.v === t.cat);
  });
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('modalSubmit').textContent = 'Save Changes';
  openModal();
}

function openModal() {
  if (!editingId) {
    document.getElementById('fTitle').value = '';
    document.getElementById('fNote').value = '';
    document.querySelectorAll('.cat-opt').forEach(function(o,i) { o.classList.toggle('active', i === 0); });
    document.getElementById('modalTitle').textContent = 'New Task';
    document.getElementById('modalSubmit').textContent = 'Add Task';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function() { document.getElementById('fTitle').focus(); }, 300);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function overlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function submitTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { document.getElementById('fTitle').focus(); return; }
  const cat = document.querySelector('.cat-opt.active') ? document.querySelector('.cat-opt.active').dataset.v : 'personal';
  const note = document.getElementById('fNote').value.trim();

  if (editingId) {
    const t = tasks.find(t => t.id === editingId);
    if (t) { t.title = title; t.cat = cat; t.note = note; }
  } else {
    tasks.unshift({ id: uid(), title: title, cat: cat, status: 'todo', note: note });
  }
  save();
  closeModal();
  render();
}

document.getElementById('tabs').addEventListener('click', function(e) {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeCat = tab.dataset.cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  render();
});

document.getElementById('filters').addEventListener('click', function(e) {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  activeStatus = pill.dataset.status;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  render();
});

document.querySelectorAll('.cat-opt').forEach(function(opt) {
  opt.addEventListener('click', function() {
    document.querySelectorAll('.cat-opt').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
  });
});

load();
render();
</script>
</body>
</html>
